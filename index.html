<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App for India</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="bg"></div>
    <div class="cont">
        <div class="search-wrapper">
            <div class="search">
                <input type="text" placeholder="Search city" autocomplete="off">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>
        <div class="temp">
            <div class="hightemp">
                <p>--</p>
                <span class="spa"><u>Temperature <i class="fa-solid fa-temperature-high"></i></u></span>
            </div>
            <div class="lowtemp">
                <p>--</p>
                <span class="spa"><u>Weather <i class="fa-solid fa-cloud-sun"></i></u></span>
            </div>
        </div>
        <address id="loc">--</address>
    </div>
    <script src="key.js"></script>
    <script src="new.js"></script>
</body>
</html>
